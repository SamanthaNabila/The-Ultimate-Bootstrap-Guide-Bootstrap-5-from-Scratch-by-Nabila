<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>\
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div id="slides-with-indicators"
                     class="carousel slide carousel-fade carousel-dark" 
                     data-bs-ride="carousel">
                     
                     <div class="carousel-indicators">
                        <button 
                             class="active"
                             type="button"
                             data-bs-target="#slides-with-indicators"
                             data-bs-slide-to="0"
                             aria-current="true"
                             aria-label="Slide 1">
                            </button>
                            <button 
                             class="active"
                             type="button"
                             data-bs-target="#slides-with-indicators"
                             data-bs-slide-to="1"
                             aria-current="true"
                             aria-label="Slide 2">
                            </button>
                            <button 
                             class="active"
                             type="button"
                             data-bs-target="#slides-with-indicators"
                             data-bs-slide-to="2"
                             aria-current="true"
                             aria-label="Slide 3">
                            </button>
                            
                     </div>

                    <div class="carousel-inner">
                        
                        <div class="carousel-item active" data-bs-interval=".01s">
                            <img class="d-blck w-100" src="images/img-2.jpg"/>
                            <div class="carousel-caption">
                                <h5>First Carousal Caption</h5>
                                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nostrum, id?</p>
                            </div>

                        </div>
                        <div class="carousel-item" data-bs-interval=".01s">
                            <img class="d-blck w-100" src="images/img-4.png"/>

                        </div>
                        <div class="carousel-item" data-bs-interval=".01s">
                            <img class="d-blck w-100" src="images/img-3.png"/>

                        </div>
                    </div>
                    <button 
                         class="carousel-control-prev"
                         type="button"
                         data-bs-target="#slides-with-indicators"
                         data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                        </button>
                        <button 
                         class="carousel-control-next"
                         type="button"
                         data-bs-target="#slides-with-indicators"
                         data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                        </button>

                </div>
                
            </div>
        </div>
    </div>
 <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" ></script> 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>      
</body>
</html>
